<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- Google Analytics (GA4) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-555NV31SNC"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-555NV31SNC');</script>
<title>善的種子 · 獵人角 · Seeds of Kindness</title>
<meta name="description" content="善的種子 — 獵人角邁向第二十年的陪伴。第一關：關懷之夜 / Care at Dusk." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="src/css/style.css" />
</head>
<body>

<!-- 語言切換 + 靜音 -->
<div class="lang">
  <button data-l="zh">中</button>
  <button data-l="en">EN</button>
  <button data-l="es">ES</button>
</div>
<button id="mute" aria-label="mute">🔊</button>

<!-- ============ 永久玻璃浮層 HUD（嵌畫框四角；hub/關卡顯示） ============ -->
<div id="hudTime" class="ghud hidden"></div>
<div id="hudCoins" class="ghud hidden"></div>
<!-- 竹筒（投幣） -->
<div id="bamboo" class="hidden">
  <div id="bambooTube"><span id="bambooFill"></span><span id="bambooIco">🎍</span></div>
  <div id="bambooCount"></div>
  <button id="pourBtn" class="hidden"></button>
</div>
<!-- 永久金圈米芽（住在金色天使光圈裡，延續到結尾/hub，永不歸零） -->
<div id="sproutRing" class="hidden">
  <div class="ring-halo"></div>
  <div id="sproutPlant"></div>
  <div id="sproutStageName"></div>
</div>

<!-- ============ 善的任意門 · 開場動畫（純 Canvas） ============ -->
<section id="opening" class="screen">
  <canvas id="doorCanvas"></canvas>
  <div class="door-kicker" id="opKicker">善的種子 · 獵人角</div>
  <div class="door-ui">
    <div class="door-invite" id="opInvite"></div>
    <div class="door-name" id="opName">
      <label id="opNameLabel" for="sproutName">幫你的米芽取個名字</label>
      <input id="sproutName" type="text" maxlength="16" />
    </div>
    <div class="door-welcome hidden" id="opWelcome"></div>
    <button class="enter" id="beginBtn"><span class="leaf">🌱</span><span id="beginTxt">推門進去</span><span class="arrow">→</span></button>
    <p class="door-note" id="opHint"></p>
    <button class="switch-link hidden" id="switchName"></button>
  </div>
</section>

<!-- ============ HUB / 白天獵人角地圖（節點散落地圖上） ============ -->
<section id="hub" class="screen hidden">
  <div id="mapStage">
    <div id="hubMap"></div>
    <div id="dawnVeil"></div>
    <div id="prosperityLayer"></div>
    <div id="greenLayer"></div>
    <div id="airLayer"></div>
    <div id="pearlLayer"></div>
    <div id="bloomLayer"></div>
    <div id="growthTree"></div>
    <div id="pinLayer"></div>
  </div>
  <div id="hubTop">
    <h2 id="hubTitle">獵人角</h2>
    <div id="hubSub"></div>
  </div>
  <div id="milestones" class="collapsed">
    <button id="msHandle"></button>
    <div id="msBody"></div>
  </div>
  <button id="hubGear" aria-label="menu">⚙️</button>
  <button id="hubHelp" aria-label="help">？</button>
  <a id="hubFeedback" class="fbCircle" aria-label="feedback">💬</a>
  <div id="hubMenu" class="hidden">
    <button id="miSwitch"></button>
    <button id="miReplay"></button>
    <button id="miRestart"></button>
  </div>
  <div id="helpPanel" class="hidden">
    <div class="help-card">
      <h3 id="helpTitle"></h3>
      <ul id="helpBody"></ul>
      <button id="helpClose"></button>
    </div>
  </div>
</section>

<!-- ============ 關卡 · 關懷之夜 ============ -->
<div id="level">
  <!-- HUD：固定最上一條 -->
  <div id="hudBar"></div>

  <!-- 舞台：場景永遠完整可見，介面不蓋它 -->
  <div id="stage">
    <div id="sceneImg"></div>
    <div id="skyWarm"></div>
    <div id="darkLayer"></div>
    <div id="coldLayer"></div>
    <div id="vignette"></div>
    <div id="glowLayer"></div>
    <div id="spotlight"></div>
    <div id="spotRing"></div>
    <div id="clueLayer"></div>
    <div id="toast"></div>
  </div>

  <!-- 最底部一條半透明窄面板，可收合 -->
  <div id="panel">
    <button id="panelTab" aria-label="toggle panel"><span id="panelChevron">▾</span></button>
    <div id="panelBody">
      <div class="prow">
        <div class="plabel" id="notesH">📝 觀察筆記</div>
        <div class="notes" id="notes"></div>
      </div>
      <div class="prow">
        <div class="plabel" id="shelfH">🧺 物資架</div>
        <div class="shelf" id="shelf"></div>
      </div>
      <div class="prow packrow">
        <div class="plabel" id="packH">🎁 關懷包</div>
        <div class="pack" id="pack"></div>
        <button id="sendBtn" disabled>送出</button>
      </div>
    </div>
  </div>
</div>

<!-- ============ 關2 · 環保小尖兵（會呼吸的動態關卡） ============ -->
<div id="level2">
  <div id="l2scene">
    <div id="l2before"></div>     <!-- 改造前（灰濛） -->
    <div id="l2after"></div>      <!-- 改造後切片（就地揭曉，JS 注入） -->
    <div id="l2bloom"></div>      <!-- 全街綻放慶祝 -->
    <div id="l2fog"></div>        <!-- 飄移的霧 -->
    <div id="l2dust"></div>       <!-- 空氣光塵 -->
    <div id="l2birds"></div>      <!-- 偶爾飛過的鳥 -->
    <div id="l2dolls"></div>      <!-- 街越乾淨、社區越多人走出來（純氛圍） -->
    <div id="l2spots"></div>      <!-- 會發光的待整理點 -->
  </div>
  <div id="l2top">
    <div id="l2title"></div>
    <button id="l2leave"></button>
  </div>
  <div id="l2intro"></div>
  <div id="l2items"></div>
  <div id="l2bins"></div>
  <div id="l2end" class="hidden">
    <div class="card">
      <h1 id="l2endTitle"></h1>
      <div id="l2plant" class="endplant"></div>
      <p id="l2endLine" class="endwarm"></p>
      <div id="l2reward" class="endreward"></div>
      <div class="row">
        <button class="btn" id="l2again"></button>
        <button class="btn blue" id="l2hub"></button>
        <a class="btn fbBtn" id="l2fb"></a>
      </div>
    </div>
  </div>
</div>

<!-- ============ 關3 · 幸福校園 畢業感恩（感恩傳遞） ============ -->
<div id="level3">
  <div id="l3scene">
    <div id="l3sky"></div>
    <div id="l3bg"></div>
    <div id="l3soft"></div>
    <div id="l3sea"></div>
    <div id="l3kids"></div>
    <div id="l3petals"></div>
    <div id="l3egg"></div>
    <div id="l3hualien" class="hidden"></div>
    <div id="l3spots"></div>
    <div id="l3bloom"></div>
  </div>
  <div id="l3top">
    <div id="l3title"></div>
    <button id="l3leave"></button>
  </div>
  <div id="l3intro"></div>
  <div id="l3items"></div>
  <div id="l3targets"></div>
  <div id="l3end" class="hidden">
    <div class="card">
      <h1 id="l3endTitle"></h1>
      <div id="l3plant" class="endplant"></div>
      <p id="l3endLine" class="endwarm"></p>
      <div id="l3reward" class="endreward"></div>
      <div class="row">
        <button class="btn" id="l3again"></button>
        <button class="btn blue" id="l3hub"></button>
        <a class="btn fbBtn" id="l3fb"></a>
      </div>
    </div>
  </div>
</div>

<!-- ============ 關4 · 互助站「最後兩份」（resourceful_helper：問→湊→斡旋） ============ -->
<div id="level4">
  <div id="l4scene">
    <div id="l4bg"></div>        <!-- 互助站室內背景（載到才覆蓋漸層 fallback） -->
    <div id="l4soft"></div>      <!-- 柔光底＋暗角，主體清楚 -->
  </div>
  <div id="l4top">
    <div id="l4title"></div>
    <button id="l4leave"></button>
  </div>
  <!-- 上方：今天還剩的物資（fresh 會見底） -->
  <div id="l4pantryWrap">
    <div id="l4pantryHead"><span id="l4pantryLabel"></span><span id="l4freshTag"></span></div>
    <div id="l4pantry"></div>
  </div>
  <!-- 中段：當前客人（圖＋對白＋多問一句） -->
  <div id="l4guest">
    <div id="l4guestArt"></div>
    <div id="l4guestPanel">
      <div id="l4guestName"></div>
      <div id="l4dialogue"></div>
      <button id="l4askMore" class="l4mini hidden"></button>
    </div>
  </div>
  <!-- 下方：關懷包（湊）＋行動鈕 -->
  <div id="l4bagWrap">
    <div id="l4bagHead"></div>
    <div id="l4bag"></div>
    <div id="l4actions"></div>   <!-- 給他 / 聊聊分一份 / 留一份 等，JS 注入 -->
  </div>
  <div id="l4end" class="hidden">
    <div class="card">
      <h1 id="l4endTitle"></h1>
      <div id="l4plant" class="endplant"></div>
      <p id="l4endLine" class="endwarm"></p>
      <p id="l4endQ" class="endwarm"></p>
      <p id="l4endHook" class="l4hook"></p>
      <div class="row">
        <button class="btn" id="l4again"></button>
        <button class="btn blue" id="l4hub"></button>
        <a class="btn fbBtn" id="l4fb"></a>
      </div>
    </div>
  </div>
</div>

<!-- ============ 結尾 · 天黑了 ============ -->
<section id="ending" class="screen hidden">
  <div class="bg" style="background-image:url('assets/images/rv_park_night.png')"></div>
  <div class="veil"></div>
  <div class="card">
    <h1 id="endTitle">天黑了</h1>
    <div id="endPlant" class="endplant"></div>
    <p id="endLine" style="font-size:14px;margin-top:8px"></p>
    <div class="big" id="endBig">0 / 5</div>
    <div id="endHomes" style="font-size:14px"></div>
    <div id="endSprout" style="font-size:14px;color:#bfe6c4;margin-top:10px"></div>
    <div id="endReward" class="endreward"></div>
    <p class="endwarm" id="endWarm"></p>
    <div class="row">
      <button class="btn" id="againBtn">再來一夜</button>
      <button class="btn blue" id="endHubBtn">回三福</button>
      <a class="btn fbBtn" id="endFb"></a>
    </div>
  </div>
</section>

<!-- ============ 靜心之門 Stillness Gate ============ -->
<section id="stillness" class="screen hidden">
  <canvas id="stillCanvas"></canvas>
  <button id="stillSkip" class="still-skip">略過 ›</button>
</section>

<!-- 資料 → i18n → 音效 → 開場動畫 → 引擎 -->
<script src="data/level1.js"></script>
<script src="data/config.js"></script>
<script src="src/js/i18n.js"></script>
<script src="src/js/audio.js"></script>
<script src="src/js/opening.js"></script>
<script src="src/js/game.js"></script>
</body>
</html>
