<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>小芽 · 善的任意門 · 獵人角</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#ffce3a; --gold-deep:#d6a418; --leaf:#4caf50; --leaf-deep:#2f8a3e;
    --tzu:#2a5db0; --tzu-deep:#1d3f7a; --ink:#23304a; --cream:#fff7e6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#23364d;font-family:'Nunito',sans-serif;touch-action:none;}
  #scene{display:block;position:fixed;inset:0;width:100%;height:100%;}

  .lang{position:fixed;top:14px;right:14px;z-index:40;display:flex;gap:6px;}
  .lang button{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer;
    padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.34);color:#3a2a14;backdrop-filter:blur(4px);}
  .lang button.on{background:#ffd98a;color:#5a3a12;}
  #mute{position:fixed;top:14px;left:14px;z-index:40;width:40px;height:40px;border:none;cursor:pointer;
    border-radius:50%;background:rgba(255,255,255,.34);font-size:18px;backdrop-filter:blur(4px);display:none;}

  /* opening (door) */
  #opening .ui{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:0 26px 44px;display:flex;flex-direction:column;align-items:center;text-align:center;
    background:linear-gradient(to top,rgba(28,32,50,.80),rgba(28,32,50,.5) 45%,rgba(28,32,50,.12) 75%,transparent);}
  .kicker{position:fixed;top:58px;left:0;right:0;z-index:20;text-align:center;font-family:'Baloo 2',sans-serif;font-weight:700;
    font-size:14px;letter-spacing:2px;color:#fff3d6;text-transform:uppercase;text-shadow:0 2px 12px rgba(20,30,50,.85);
    opacity:0;animation:rise .8s ease .3s forwards;}
  .invite{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:22px;line-height:1.4;color:#fff;margin:8px 0 20px;max-width:440px;
    text-shadow:0 2px 14px rgba(20,30,50,.6);opacity:0;animation:rise .8s ease .55s forwards;}
  .enter{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:21px;border:none;cursor:pointer;color:#5a3a12;
    background:linear-gradient(180deg,#ffe7a6,#ffce5e);padding:16px 40px;border-radius:999px;display:flex;align-items:center;gap:11px;
    box-shadow:0 8px 0 #d99a2e,0 18px 30px -10px rgba(120,70,0,.6);opacity:0;animation:rise .8s ease .8s forwards,glowpulse 2.6s ease-in-out 1.6s infinite;}
  .enter:active{transform:translateY(5px);box-shadow:0 3px 0 #d99a2e,0 10px 20px -10px rgba(120,70,0,.6);}
  .note{font-family:'Nunito';font-weight:700;font-size:11px;color:rgba(255,255,255,.55);margin-top:16px;opacity:0;animation:rise .8s ease 1.1s forwards;}

  /* cards (role + level intro + finale + toast) */
  .screen{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;
    background:radial-gradient(120% 90% at 50% 18%,rgba(40,60,90,.4),rgba(20,30,50,.62) 75%);}
  .screen.hidden{display:none;}
  .card{background:rgba(255,255,255,.95);border-radius:28px;padding:24px 22px;max-width:440px;width:100%;
    box-shadow:0 26px 60px -22px rgba(20,30,50,.7);border:3px solid #fff;animation:pop .45s cubic-bezier(.2,1.4,.4,1) both;}
  .card h1{font-family:'Baloo 2',cursive;font-weight:800;color:var(--tzu-deep);font-size:25px;line-height:1.15;margin-bottom:6px;}
  .card .sub{font-family:'Baloo 2',cursive;color:var(--leaf);font-weight:700;font-size:15px;margin-bottom:16px;}
  .card p{color:var(--ink);font-size:14.5px;line-height:1.55;margin-bottom:16px;}
  .roleGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
  .roleBtn{font-family:'Baloo 2',cursive;font-weight:800;font-size:15px;border:none;cursor:pointer;padding:14px 10px;border-radius:16px;
    color:#fff;background:var(--tzu);box-shadow:0 6px 0 var(--tzu-deep);display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .08s,box-shadow .08s;}
  .roleBtn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--tzu-deep);}
  .roleBtn .ic{font-size:26px;}
  .roleBtn small{font-weight:700;font-size:11px;opacity:.9;}
  .btn{font-family:'Baloo 2',cursive;font-weight:800;font-size:19px;border:none;cursor:pointer;width:100%;padding:15px 18px;border-radius:16px;
    color:#fff;background:var(--leaf);text-decoration:none;box-shadow:0 7px 0 var(--leaf-deep);display:flex;align-items:center;justify-content:center;gap:10px;}
  .btn:active{transform:translateY(5px);box-shadow:0 2px 0 var(--leaf-deep);}
  .btn.gold{background:var(--gold);color:var(--tzu-deep);box-shadow:0 7px 0 var(--gold-deep);}
  .btn.gold:active{box-shadow:0 2px 0 var(--gold-deep);}
  .btn.ghost{background:#8aa0c4;box-shadow:0 7px 0 #5f74a0;margin-top:11px;}
  .btn.ghost:active{box-shadow:0 2px 0 #5f74a0;}
  .links{display:flex;gap:10px;margin-top:11px;}
  .link{flex:1;font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;text-decoration:none;color:#fff;padding:12px;border-radius:13px;background:var(--tzu);box-shadow:0 5px 0 var(--tzu-deep);}
  .tzuline{font-size:12px;color:#6b7891;font-weight:700;margin-top:14px;}
  #introPhoto{width:100%;max-height:180px;object-fit:cover;border-radius:16px;margin-bottom:14px;box-shadow:0 8px 20px -10px rgba(20,30,50,.5);}
  .introMeta{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .stars{font-size:15px;letter-spacing:1px;color:#ffb52e;}
  .mech{font-family:'Baloo 2',cursive;font-weight:800;font-size:12px;color:#fff;background:var(--tzu);padding:3px 11px;border-radius:999px;}
  /* node label & stars styled in .node block below (legibility pass) */

  /* hub */
  #hub{position:fixed;inset:0;z-index:15;display:none;}
  #vitality{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:18;width:min(78vw,360px);
    background:rgba(255,255,255,.88);border-radius:999px;padding:6px 10px;box-shadow:0 6px 16px -6px rgba(20,30,50,.4);}
  #vitality .lab{font-family:'Baloo 2',cursive;font-weight:800;color:var(--tzu-deep);font-size:12.5px;text-align:center;margin-bottom:3px;}
  #vbar{height:9px;border-radius:999px;background:#e3e9f2;overflow:hidden;}
  #vfill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#ffd98a,#ffce3a,#ffb347);transition:width .6s ease;}
  .node{position:absolute;z-index:16;transform:translate(-50%,-50%);border:none;cursor:pointer;background:transparent;
    display:flex;flex-direction:column;align-items:center;gap:4px;width:104px;}
  .node .dot{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;
    background:#fff;border:4px solid var(--tzu-deep);
    box-shadow:0 0 0 7px rgba(16,24,42,.26),0 8px 16px -3px rgba(0,0,0,.6);transition:transform .1s;}
  .node:active .dot{transform:scale(.92);}
  .node .label{display:flex;flex-direction:column;align-items:center;gap:1px;
    background:rgba(24,36,66,.95);padding:3px 11px 4px;border-radius:12px;box-shadow:0 4px 12px -3px rgba(0,0,0,.65);}
  .node .nm{font-family:'Baloo 2',cursive;font-weight:800;font-size:13px;color:#fff;line-height:1.1;text-align:center;white-space:nowrap;}
  .node .stars{font-size:11px;letter-spacing:1px;color:#ffd24a;line-height:1;}
  .node .tag{font-family:'Baloo 2',cursive;font-weight:800;font-size:10.5px;padding:2px 11px;border-radius:999px;color:#5a3a12;background:#ffd24a;box-shadow:0 3px 8px -3px rgba(0,0,0,.55);}
  .node.play .dot{width:72px;height:72px;font-size:35px;border-color:var(--gold-deep);
    background:radial-gradient(circle at 50% 38%,#fff,#ffe7ad);box-shadow:0 0 0 9px rgba(255,206,58,.4),0 9px 18px -3px rgba(0,0,0,.6);animation:nodeglow 1.9s ease-in-out infinite;}
  .node.play .tag{background:var(--gold);color:#5a3a12;}
  .node.soon .dot{border-color:#54657f;box-shadow:0 0 0 7px rgba(16,24,42,.24),0 7px 14px -3px rgba(0,0,0,.55);}
  .node.soon .tag{background:#d7dce6;color:#41506b;}
  .node.done .dot{background:linear-gradient(180deg,#fff0c0,#ffce3a);border-color:var(--gold-deep);box-shadow:0 0 0 9px rgba(255,206,58,.45),0 8px 16px -3px rgba(0,0,0,.55);}
  .node.done .tag{background:#5ec46a;color:#0f3d12;}
  #playBar{position:fixed;left:0;right:0;bottom:0;z-index:18;display:none;justify-content:center;padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(28,32,50,.55),transparent);}
  #playBar .btn{max-width:430px;}

  /* level HUD + tray */
  #lvHud{position:fixed;top:12px;left:0;right:0;z-index:18;display:none;justify-content:center;gap:9px;pointer-events:none;}
  .chip{font-family:'Baloo 2',cursive;font-weight:800;color:var(--tzu-deep);font-size:16px;background:rgba(255,255,255,.9);padding:6px 14px;border-radius:999px;box-shadow:0 6px 16px -6px rgba(20,30,50,.4);}
  #tray{position:fixed;left:0;right:0;bottom:0;z-index:18;display:none;justify-content:center;gap:10px;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(28,32,50,.5),transparent);}
  .food{position:relative;width:60px;height:60px;border:none;cursor:pointer;border-radius:18px;background:rgba(255,255,255,.95);font-size:29px;
    box-shadow:0 7px 0 rgba(180,150,60,.5),0 12px 22px -8px rgba(0,0,0,.35);transition:transform .07s,box-shadow .07s;display:flex;align-items:center;justify-content:center;}
  .food:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(180,150,60,.5);}
  @media (max-width:380px){.food{width:52px;height:52px;font-size:25px;} .node{width:92px;} .node .dot{width:56px;height:56px;font-size:28px;} .node.play .dot{width:64px;height:64px;}}

  #toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:35;opacity:0;pointer-events:none;
    background:rgba(35,48,74,.94);color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;padding:11px 18px;border-radius:14px;
    max-width:84vw;text-align:center;transition:opacity .25s,transform .25s;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  #wipe{position:fixed;inset:0;z-index:50;pointer-events:none;background:radial-gradient(circle at 50% 50%,#fff6c8,#ffce3a 40%,#4caf50 78%);clip-path:circle(0% at 50% 50%);transition:clip-path .55s ease-in-out;}
  #wipe.open{clip-path:circle(150% at 50% 50%);}

  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glowpulse{0%,100%{box-shadow:0 8px 0 #d99a2e,0 18px 30px -10px rgba(120,70,0,.6),0 0 0 0 rgba(255,221,140,.55)}50%{box-shadow:0 8px 0 #d99a2e,0 18px 34px -8px rgba(120,70,0,.6),0 0 0 14px rgba(255,221,140,0)}}
  @keyframes pop{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
  @keyframes nodeglow{0%,100%{box-shadow:0 0 0 0 rgba(255,221,140,.5),0 8px 18px -6px rgba(0,0,0,.4)}50%{box-shadow:0 0 0 9px rgba(255,221,140,0),0 8px 18px -6px rgba(0,0,0,.4)}}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="lang"><button data-lang="zh" class="on">中文</button><button data-lang="en">EN</button><button data-lang="es">ES</button></div>
<button id="mute">🔊</button>

<!-- opening (door) -->
<div id="opening">
  <div class="kicker" id="kicker"></div>
  <div class="ui">
    <div class="invite" id="invite"></div>
    <button class="enter" id="enter"><span>🌱</span><span id="enterTxt"></span><span>→</span></button>
    <div class="note" id="note"></div>
  </div>
</div>

<!-- role select -->
<div class="screen hidden" id="roleScreen">
  <div class="card">
    <h1 id="roleTitle"></h1>
    <div class="sub" id="roleSub"></div>
    <div class="roleGrid" id="roleGrid"></div>
  </div>
</div>

<!-- hub -->
<div id="hub">
  <div id="vitality"><div class="lab" id="vlab"></div><div id="vbar"><div id="vfill"></div></div></div>
  <!-- nodes injected here -->
</div>
<div id="playBar"><button class="btn gold" id="finaleBtn"></button></div>

<!-- level intro (every node = a story preview: 來龍去脈 + 星級 + 玩法) -->
<div class="screen hidden" id="introScreen">
  <div class="card">
    <img id="introPhoto" alt="" style="display:none" />
    <h1 id="introTitle"></h1>
    <div class="introMeta"><span class="stars" id="introStars"></span><span class="mech" id="introMech"></span></div>
    <p id="introBody"></p>
    <button class="btn" id="introGo"></button>
  </div>
</div>

<!-- level HUD + tray -->
<div id="lvHud"><div class="chip" id="cServed">💛 0</div><div class="chip" id="cBlock"></div></div>
<div id="tray"></div>

<!-- finale -->
<div class="screen hidden" id="finaleScreen">
  <div class="card">
    <h1 id="finaleTitle"></h1>
    <div class="sub" id="finaleSub"></div>
    <p id="finaleInvite"></p>
    <a class="btn gold" id="joinBtn" href="https://www.facebook.com/profile.php?id=61579616136584" target="_blank" rel="noopener"></a>
    <div class="links">
      <a class="link" href="https://www.facebook.com/profile.php?id=61579616136584" target="_blank" rel="noopener">Facebook</a>
      <a class="link" href="https://www.instagram.com/tzuchiusa.sf" target="_blank" rel="noopener">Instagram</a>
    </div>
    <div class="tzuline" id="finaleTzu"></div>
    <button class="btn ghost" id="backHubBtn"></button>
  </div>
</div>

<div id="toast"></div>
<div id="wipe"></div>

<script>
(() => {
"use strict";
/* =========================================================================
   小芽 · 善的任意門 · 獵人角  —  架構版 (Day-1 skeleton)
   門 → 選角色 → 獵人角會發亮的城(7 個真實活動節點 + 社區活力)
        → 進一關(食物發放=可玩情境) → 完成點亮那一塊 → 回城 → 邀請
   單檔 · 純 Canvas · 離線 · 三語 · 資料驅動(可加關卡/角色) · GitHub Pages-ready

  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      if(typeof r==='number')r=[r,r,r,r];const tl=r[0],tr=r[1]!=null?r[1]:r[0],br=r[2]!=null?r[2]:r[0],bl=r[3]!=null?r[3]:r[0];
      this.moveTo(x+tl,y);this.lineTo(x+w-tr,y);this.arcTo(x+w,y,x+w,y+tr,tr);this.lineTo(x+w,y+h-br);this.arcTo(x+w,y+h,x+w-br,y+h,br);
      this.lineTo(x+bl,y+h);this.arcTo(x,y+h,x,y+h-bl,bl);this.lineTo(x,y+tl);this.arcTo(x,y,x+tl,y,tl);return this;};

  $('introGo').addEventListener('click',()=>{$('introScreen').classList.add('hidden');if(introA&&introA.state==='play'&&!introA.done){doorWipe(()=>startLevel(introA));}});

  /* ====================================================================
     LEVEL — basic situational food share (a real, small scene; deepened on Day 2)
     ==================================================================== */
  let queue=[],active=null,throws=[],floats=[],pops=[],served=0,blockLights=0,stallY=0,sproutPos={x:0,y:0},lvIdx=0,banner='';
  function layoutStall(){stallY=H*0.70;sproutPos={x:W*0.5,y:stallY-56};}
  function startLevel(a){
    state='level';served=0;blockLights=0;lvIdx=0;throws=[];floats=[];pops=[];
    queue=NEIGHBORS.map((n,i)=>({...n,x:W*(0.30+0.40*((i)%2)),y:stallY-150-(i%2?14:0),arrive:0,t:Math.random()*6,bob:Math.random()*6,want:n.want,served:false,leaving:0,toldStory:false}));
    // stagger arrival: only first 2 present, rest cycle in
    queue.forEach((n,i)=>{n.present=i<2;n.slot=i<2?i:null;});
    active=null;
    banner=lang==='zh'?'AG 食物發放':lang==='es'?'Reparto de comida AG':'AG Food Share';
    $('hub').style.display='none';$('lvHud').style.display='flex';$('tray').style.display='flex';$('playBar').style.display='none';
    $('cServed').textContent='💛 0 / '+NEIGHBORS.length;$('cBlock').textContent=tName(curActivity.name);
    buildTray();
  }
  function buildTray(){const tray=$('tray');tray.innerHTML='';FOODS.forEach(f=>{const b=document.createElement('button');b.className='food';b.textContent=f.e;b.addEventListener('click',()=>serveFood(f.id));tray.appendChild(b);});}
  function presentNext(){const waiting=queue.find(n=>!n.present&&!n.served);if(waiting){const slot=[0,1].find(s=>!queue.some(n=>n.present&&!n.served&&n.slot===s));waiting.present=true;waiting.slot=slot==null?0:slot;waiting.x=W*(0.30+0.40*(waiting.slot));waiting.y=stallY-150-(waiting.slot?14:0);waiting.arrive=0;}}
  function serveFood(foodId){
    if(state!=='level')return;
    let target=queue.find(n=>n.present&&!n.served&&n.want===foodId&&!n.inFlight);
    if(!target){blip(180,.12,'sawtooth',.13);return;}
    const f=FOODS.find(x=>x.id===foodId);target.inFlight=true;
    throws.push({x0:sproutPos.x,y0:sproutPos.y-6,x:sproutPos.x,y:sproutPos.y-6,tx:target.x,ty:target.y-6,e:f.e,t:0,dur:.42,nb:target});
    blip(540,.10,'triangle',.18);
  }
  function completeServe(nb){
    nb.served=true;nb.inFlight=false;nb.present=false;served++;blockLights=Math.min(1,served/NEIGHBORS.length);
    pops.push({x:nb.x,y:nb.y-30,t:0,burst:true});
    floats.push({x:nb.x,y:nb.y-52,t:0,txt:tName(nb.nm)+'：'+tName(nb.line),wide:true}); // the heartfelt line = 情境
    blip(660,.16,'sine',.2);setTimeout(()=>blip(880,.18,'sine',.2),120);
    $('cServed').textContent='💛 '+served+' / '+NEIGHBORS.length;
    setTimeout(presentNext,500);
    if(served>=NEIGHBORS.length)setTimeout(finishLevel,1400);
  }
  function finishLevel(){
    curActivity.done=true;            // persist: this block is lit, carries to hub
    blip(740,.2,'sine',.22);
    doorWipe(()=>{enterHub(false);showToast(T[lang].blockLit);});
  }

  function drawNeighbor(nb,t){
    if(!nb.present||nb.served&&nb._gone)return;
    nb.arrive=Math.min(1,nb.arrive+.02);
    const rise=(1-nb.arrive)*40,bob=Math.sin(t*2+nb.bob)*3,x=nb.x,y=nb.y+bob+rise;
    ctx.save();
    ctx.fillStyle=nb.shirt;ctx.beginPath();ctx.roundRect(x-15,y-2,30,34,9);ctx.fill();
    ctx.fillStyle=nb.skin;ctx.beginPath();ctx.arc(x,y-14,12,0,7);ctx.fill();
    ctx.fillStyle='#2a2418';ctx.beginPath();ctx.arc(x-4,y-15,1.7,0,7);ctx.arc(x+4,y-15,1.7,0,7);ctx.fill();
    if(nb.served){ctx.strokeStyle='#2a2418';ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(x,y-11,4,.2,Math.PI-.2);ctx.stroke();}
    ctx.fillStyle='#b9824e';ctx.beginPath();ctx.roundRect(x-12,y+20,24,12,4);ctx.fill();
    // name tag
    ctx.fillStyle='rgba(35,48,74,.82)';ctx.beginPath();ctx.roundRect(x-26,y+34,52,16,7);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10.5px "Baloo 2",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(tName(nb.nm),x,y+42);
    ctx.restore();
    if(!nb.served&&!nb.inFlight){const f=FOODS.find(x=>x.id===nb.want);const by=y-40;
      ctx.save();ctx.fillStyle='rgba(255,255,255,.95)';ctx.strokeStyle='#e7d49a';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x-19,by-19,38,34,12);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-6,by+13);ctx.lineTo(x,by+22);ctx.lineTo(x+6,by+13);ctx.closePath();ctx.fillStyle='rgba(255,255,255,.95)';ctx.fill();
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='24px serif';ctx.fillText(f.e,x,by);ctx.restore();}
  }
  function renderLevel(dt,t){
    drawSky('#3a5e84');drawBay(t);drawHouses(blockLights);drawGround();
    // stall
    const cy=stallY;ctx.fillStyle='#caa24e';ctx.fillRect(0,cy-6,W,14);ctx.fillStyle='#b07d3a';ctx.fillRect(0,cy+8,W,H-cy);
    ctx.fillStyle='rgba(42,93,176,.92)';ctx.fillRect(W*.5-120,cy-84,240,28);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='bold 14px "Baloo 2",sans-serif';ctx.fillText(banner,W*.5,cy-70);
    queue.forEach(nb=>drawNeighbor(nb,t));
    drawSprout(sproutPos.x,sproutPos.y+Math.sin(t*1.6)*5,t,1.0+blockLights*0.25,false);
    ctx.textAlign='center';ctx.textBaseline='middle';
    for(const th of throws){th.t+=dt;const p=Math.min(1,th.t/th.dur);th.x=th.x0+(th.tx-th.x0)*p;th.y=th.y0+(th.ty-th.y0)*p-Math.sin(p*Math.PI)*Math.min(150,H*.17);
      ctx.save();ctx.translate(th.x,th.y);ctx.rotate(p*6);ctx.font='25px serif';ctx.fillText(th.e,0,0);ctx.restore();
      if(p>=1){th.done=true;completeServe(th.nb);}}
    throws=throws.filter(th=>!th.done);
    pops.forEach(p=>{p.t+=dt;const k=p.t/.8;if(p.burst){ctx.save();ctx.globalAlpha=1-k;ctx.strokeStyle='#ffe9a8';ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,8+k*26,0,7);ctx.stroke();ctx.restore();}});pops=pops.filter(p=>p.t<.8);
    floats.forEach(f=>{f.t+=dt;const k=f.t/2.4;ctx.save();ctx.globalAlpha=Math.max(0,1-k);ctx.fillStyle='#fff';ctx.font='bold 13px "Baloo 2",sans-serif';ctx.textAlign='center';
      // wrap the heartfelt line in a soft pill so it reads as a moment
      const tw=ctx.measureText(f.txt).width;ctx.fillStyle='rgba(35,48,74,'+Math.max(0,.8-k)+')';ctx.beginPath();ctx.roundRect(f.x-tw/2-10,f.y-f.t*16-12,tw+20,22,11);ctx.fill();
      ctx.fillStyle='#fff';ctx.fillText(f.txt,f.x,f.y-f.t*16-1);ctx.restore();});floats=floats.filter(f=>f.t<2.4);
  }

  /* ---------- hub render ---------- */
  function coverDraw(img){const iw=img.naturalWidth,ih=img.naturalHeight;if(!iw)return false;const s=Math.max(W/iw,H/ih),w=iw*s,h=ih*s;ctx.drawImage(img,(W-w)/2,(H-h)/2,w,h);return true;}
  function renderHub(dt,t){
    if(mapReady&&coverDraw(mapImg)){
      const lf=litFrac();
      const g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'rgba(20,32,62,'+(.48-.26*lf)+')');g.addColorStop(1,'rgba(255,198,120,'+(.05+.16*lf)+')');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
      ACTIVITIES.forEach(a=>{if(a.done){const x=a.x*W,y=a.y*H,rg=ctx.createRadialGradient(x,y,4,x,y,130);rg.addColorStop(0,'rgba(255,221,140,.55)');rg.addColorStop(1,'rgba(255,221,140,0)');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(x,y,130,0,7);ctx.fill();}});
    }else{drawSky('#33567c');drawClouds(dt);drawGulls(dt,t);drawBay(t);drawHouses(litFrac());drawGround();}
    drawMotes(dt,t);
    drawSprout(W*.5+Math.sin(t*.6)*W*.06,H*.15+Math.sin(t*1.4)*6,t,.62,true);
  }
  function renderOpening(dt,t){drawSky();drawClouds(dt);drawGulls(dt,t);drawBay(t);drawHouses(0);drawDoor(t);const cx=W*.5+Math.min(W*.27,126)*.72;drawSprout(cx+Math.sin(t*1.05)*5,H*.55-26+Math.sin(t*1.6)*9,t,1.12,true);drawMotes(dt,t);}

  /* ---------- loop ---------- */
  function loop(now){let dt=(now-last)/1000;last=now;if(dt>.05)dt=.05;const t=(now-t0)/1000;blink+=dt;
    if(state==='opening'||state==='role')renderOpening(dt,t);
    else if(state==='hub')renderHub(dt,t);
    else if(state==='level')renderLevel(dt,t);
    else if(state==='finale')renderHub(0,t);
    requestAnimationFrame(loop);}

  /* ---------- transitions / toast ---------- */
  const wipe=$('wipe');
  function doorWipe(cb){wipe.classList.add('open');setTimeout(()=>{cb();setTimeout(()=>wipe.classList.remove('open'),60);},540);}
  let toastTimer=null;
  function showToast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2600);}

  /* ---------- wiring ---------- */
  $('enter').addEventListener('click',()=>{ensureAudio();blip(440,.12,'sine',.18);doorWipe(()=>{state='role';$('opening').style.display='none';$('roleScreen').classList.remove('hidden');});});
  $('finaleBtn').addEventListener('click',()=>{state='finale';$('hub').style.display='none';$('playBar').style.display='none';updateVitality();$('finaleScreen').classList.remove('hidden');blip(660,.18,'sine',.22);});
  $('backHubBtn').addEventListener('click',()=>{$('finaleScreen').classList.add('hidden');doorWipe(()=>enterHub(false));});

  /* ---------- boot ---------- */
  resize();applyLang();requestAnimationFrame(loop);
})();
</script>
</body>
